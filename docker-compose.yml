services:
  postgres:
    image: postgres:16-alpine
    container_name: contenly-postgres
    restart: unless-stopped
    env_file:
      - .env.dokploy
    volumes:
      - contenly_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: contenly-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: contenly-backend
    restart: unless-stopped
    env_file:
      - .env.dokploy
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
    volumes:
      - contenly_uploads:/app/uploads
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.contenly-api.rule=Host(`contenly.app`) && PathPrefix(`/api`)
      - traefik.http.routers.contenly-api.entrypoints=websecure
      - traefik.http.routers.contenly-api.tls.certresolver=letsencrypt
      - traefik.http.services.contenly-api.loadbalancer.server.port=3001
    ports:
      - "3011:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: https://contenly.app/api/v1
    container_name: contenly-frontend
    restart: unless-stopped
    env_file:
      - .env.dokploy
    environment:
      PORT: 3000
    depends_on:
      - backend
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.contenly-web.rule=Host(`contenly.app`) || Host(`www.contenly.app`)
      - traefik.http.routers.contenly-web.priority=200
      - traefik.http.routers.contenly-web.entrypoints=websecure
      - traefik.http.routers.contenly-web.tls.certresolver=letsencrypt
      - traefik.http.routers.contenly-web-http.rule=Host(`contenly.app`) || Host(`www.contenly.app`)
      - traefik.http.routers.contenly-web-http.priority=200
      - traefik.http.routers.contenly-web-http.entrypoints=web
      - traefik.http.routers.contenly-web-http.middlewares=redirect-to-https@file
      - traefik.http.services.contenly-web.loadbalancer.server.port=3000
    ports:
      - "3010:3000"

volumes:
  contenly_postgres_data:
  contenly_uploads:

networks:
  dokploy-network:
    external: true
