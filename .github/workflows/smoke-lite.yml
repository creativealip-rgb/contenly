name: Smoke Lite

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Backend unit tests
        run: npm test -- articles/articles.service.spec.ts --runInBand
        working-directory: backend

      - name: Backend build
        run: npm run build
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Frontend build
        run: npm run build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://contenly.app/api/v1
